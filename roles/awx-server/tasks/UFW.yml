---
- name: Install UFW
  become: true
  ansible.builtin.package:
    name: ufw
    state: present
- name: Allow Outgoing Traffic UFW
  become: true
  community.general.ufw:
    direction: outgoing
    default: allow
- name: Deny Incoming Traffic UFW
  become: true
  community.general.ufw:
    direction: incoming
    default: deny
- name: Allow SSH Traffic UFW
  become: true
  community.general.ufw:
    rule: allow
    name: OpenSSH
- name: Allow HTTP Traffic UFW
  become: true
  community.general.ufw:
    rule: allow
    name: Nginx HTTP
- name: Allow K3s supervisor
  become: true
  community.general.ufw:
    rule: allow
    proto: tcp
    port: '6443'
  when: k8s_method == "K3s"
- name: Allow K3s Pods
  become: true
  community.general.ufw:
    rule: allow
    src: 10.42.0.0/16
  when: k8s_method == "K3s"
- name: Allow K3s Services
  become: true
  community.general.ufw:
    rule: allow
    src: 10.43.0.0/16
  when: k8s_method == "K3s"
- name: Enable UFW
  become: true
  community.general.ufw:
    state: enabled
...
