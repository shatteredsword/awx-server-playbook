---
- name: Create AWX kustomization directory
  become: true
  ansible.builtin.file:
    path: "{{ awx_project_directory }}/{{ awx_kustomization_directory }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user_id }}"
    group: nogroup
- name: Configure AWX instance
  ansible.builtin.template:
    src: awx.yaml.j2
    dest: "{{ awx_project_directory }}/{{ awx_kustomization_directory }}/awx.yaml"
    mode: '600'
  register: awx_config
- name: Create AWX instance kustomization file
  ansible.builtin.template:
    src: awx_kustomization.j2
    dest: "{{ awx_project_directory }}/{{ awx_kustomization_directory }}/kustomization.yaml"
    mode: '600'
  register: awx_kustomize_file
- name: Build AWX instance kustomize file
  ansible.builtin.command: "kustomize build {{ awx_project_directory }}/{{ awx_kustomization_directory }} -o {{ awx_project_directory }}/awx-final.yaml"
  when: awx_kustomize_file is changed # noqa: no-handler
  changed_when: awx_kustomize_file is changed
- name: Check if awx instance already exists
  ansible.builtin.command: "{{ kubectl_mapping[k8s_method] }} get pods
    -l app.kubernetes.io/managed-by=awx-operator
    -n awx
    -o=jsonpath='{range .items[*]}{.status.containerStatuses[*].ready}{end}'
    --sort-by='{.status.containerStatuses[*].image}'"
  register: awx_instance_status
  changed_when: false
- name: Build awx cluster
  ansible.builtin.command: "{{ kubectl_mapping[k8s_method] }} apply -f {{ awx_project_directory }}/awx-final.yaml"
  when: (awx_instance_status.stdout != "truetrue true true truetrue true true") or (awx_kustomize_file is changed)
  changed_when: (awx_instance_status.stdout != "truetrue true true truetrue true true") or (awx_kustomize_file is changed) # noqa: no-handler
- name: Wait for postgres pod to be ready
  ansible.builtin.command: "{{ kubectl_mapping[k8s_method] }} get pods -l app.kubernetes.io/name=postgres-13
    -n awx -o=jsonpath='{range .items[*]}{.status.containerStatuses[*].ready}{end}'"
  register: postgres_pod_status
  until: postgres_pod_status.stdout == "true"
  retries: 10000000
  delay: 10
  changed_when: false
- name: Wait for awx task pods to be ready
  ansible.builtin.command: "{{ kubectl_mapping[k8s_method] }} get pods -l app.kubernetes.io/name=awx-task
    -n awx -o=jsonpath='{range .items[*]}{.status.containerStatuses[*].ready}{end}'"
  register: task_pods_status
  until: task_pods_status.stdout == "true true true true"
  retries: 10000000
  delay: 10
  changed_when: false
- name: Wait for awx web pods to be ready
  ansible.builtin.command: "{{ kubectl_mapping[k8s_method] }} get pods -l app.kubernetes.io/name=awx-web
    -n awx -o=jsonpath='{range .items[*]}{.status.containerStatuses[*].ready}{end}'"
  register: web_pods_status
  until: web_pods_status.stdout == "true true true"
  retries: 10000000
  delay: 10
  changed_when: false
- name: Wait for operator rollout to complete
  ansible.builtin.command: "{{ kubectl_mapping[k8s_method] }} rollout status deployments/awx-operator-controller-manager -n awx -w"
  changed_when: false
- name: Wait for task rollout to complete
  ansible.builtin.command: "{{ kubectl_mapping[k8s_method] }} rollout status deployments/awx-task -n awx -w"
  changed_when: false
- name: Wait for web rollout to complete
  ansible.builtin.command: "{{ kubectl_mapping[k8s_method] }} rollout status deployments/awx-web -n awx -w"
  changed_when: false
- name: Wait for URL to be accessible
  ansible.builtin.uri:
    url: "http://{{ ansible_facts['fqdn'] }}"
    status_code: 200
  register: awx_url
  until: awx_url.status == 200
  retries: 100000
  delay: 10
  changed_when: false
...
